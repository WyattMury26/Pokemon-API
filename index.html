<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Pokémon Collection</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px; }
        
        /* UI Elements */
        #auth-container { 
            background: #2d2d2d; max-width: 300px; margin: 50px auto; 
            padding: 30px; border-radius: 15px; border: 2px solid #ffcb05;
        }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; border-radius: 5px; border: none; }
        button { background: #ffcb05; color: #1a1a1a; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Card Styling */
        .card { 
            background: #2d2d2d; border-radius: 20px; padding: 20px; width: 220px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: transform 0.3s;
            border: 2px solid #ef5350;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 120px; height: 120px; background: #3d3d3d; border-radius: 50%; }
        h2 { color: #ffcb05; margin: 10px 0; }
        .stats { font-size: 0.9em; color: #bdc3c7; }
        .type { background: #ef5350; padding: 5px 15px; border-radius: 20px; font-size: 0.8em; }

        /* Floating Plus Button */
        #toggle-catch-btn {
            background: #4caf50; margin: 20px auto; border-radius: 50px; 
            width: 50px; height: 50px; font-size: 24px; color: white;
        }
    </style>
</head>
<body>
    <h1>🔥 My Pokémon Team 🔥</h1>

    <button id="logout-btn" onclick="handleLogout()" style="display: none; position: absolute; top: 20px; right: 20px; background: #ef5350;">Logout</button>
    <button id="league-btn" onclick="toggleLeagueView()" style="display: none; position: absolute; top: 20px; left: 20px;">View Global League</button>
    <button id="toggle-catch-btn" onclick="toggleCatchForm()" style="display: none;">+</button>

    <div id="auth-container">
        <div id="login-section">
            <h2>Trainer Login</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
            <p>New trainer? <a href="#" onclick="toggleAuth(true)" style="color: #ffcb05;">Register here</a></p>
        </div>
        <div id="register-section" style="display: none;">
            <h2>New Trainer Registration</h2>
            <input type="text" id="reg-username" placeholder="Choose Username">
            <input type="password" id="reg-password" placeholder="Choose Password">
            <button onclick="handleRegister()">Sign Up</button>
            <p>Already have an account? <a href="#" onclick="toggleAuth(false)" style="color: #ffcb05;">Login here</a></p>
        </div>
        <p id="auth-error" style="color: #ef5350; font-size: 0.8em;"></p>
    </div>

    <div id="catch-container" style="display: none; background: #2d2d2d; max-width: 400px; margin: 10px auto; padding: 20px; border-radius: 15px; border: 2px solid #4caf50; position: relative;">
        <button onclick="toggleCatchForm()" style="position: absolute; top: 10px; right: 10px; background: none; border: none; color: #aaa; cursor: pointer;">✕</button>
        <h3>New Discovery!</h3>
        <input type="text" id="poke-name" placeholder="Pokémon Name">
        <input type="text" id="poke-type" placeholder="Type (e.g. Fire)">
        <input type="text" id="poke-sprite" placeholder="Sprite URL">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <input type="number" id="poke-hp" placeholder="HP" style="width: 70px;">
            <input type="number" id="poke-atk" placeholder="ATK" style="width: 70px;">
        </div>
        <button onclick="catchPokemon()" style="background: #4caf50; margin-top: 10px; color: white;">Add to Team</button>
        <p id="catch-msg" style="font-size: 0.8em; margin-top: 10px;"></p>
    </div>

    <div class="container" id="pokedex"></div>

    <script>
        // --- UI TOGGLES ---
        function toggleAuth(showRegister) {
            document.getElementById('login-section').style.display = showRegister ? 'none' : 'block';
            document.getElementById('register-section').style.display = showRegister ? 'block' : 'none';
            document.getElementById('auth-error').innerText = "";
        }

        function toggleCatchForm() {
            const container = document.getElementById('catch-container');
            const btn = document.getElementById('toggle-catch-btn');
            if (container.style.display === 'none') {
                container.style.display = 'block';
                btn.style.display = 'none';
            } else {
                container.style.display = 'none';
                btn.style.display = 'block';
            }
        }

        let showingLeague = false;
        async function toggleLeagueView() {
            showingLeague = !showingLeague;
            const btn = document.getElementById('league-btn');
            const plusBtn = document.getElementById('toggle-catch-btn');
            const catchContainer = document.getElementById('catch-container');

            if (showingLeague) {
                btn.innerText = "View My Team";
                btn.style.background = "#4caf50";
                btn.style.color = "white";
                
                // Hide the catch tools in League mode
                if (plusBtn) plusBtn.setAttribute("style", "display: none !important;");
                if (catchContainer) catchContainer.style.display = 'none';
                
                loadLeague();
            } else {
                btn.innerText = "View Global League";
                btn.style.background = "#ffcb05";
                btn.style.color = "#1a1a1a";
                
                // RESTORE the button for your personal team
                if (plusBtn) plusBtn.setAttribute("style", "display: block; background: #4caf50; margin: 20px auto; border-radius: 50px; width: 50px; height: 50px; font-size: 24px; color: white; cursor: pointer; border: none;");
                
                loadPokemon();
            }
        }

        // --- AUTH LOGIC ---
        function checkAuth() {
            const token = localStorage.getItem('token');
            const logoutBtn = document.getElementById('logout-btn');
            const leagueBtn = document.getElementById('league-btn');
            const plusBtn = document.getElementById('toggle-catch-btn');

            if (token) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('pokedex').style.display = 'flex';
                
                if (plusBtn) plusBtn.style.display = 'block'; 
                document.getElementById('catch-container').style.display = 'none'; 
                
                if (logoutBtn) logoutBtn.style.display = 'block';
                if (leagueBtn) leagueBtn.style.display = 'block';
                loadPokemon();
            } else {
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('pokedex').style.display = 'none';
                
                if (plusBtn) plusBtn.style.display = 'none';
                document.getElementById('catch-container').style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'none';
                if (leagueBtn) leagueBtn.style.display = 'none';
            }
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const response = await fetch('https://pokemon-api-2llp.onrender.com/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token); 
                    checkAuth(); 
                } else {
                    document.getElementById('auth-error').innerText = data.msg || "Login Failed";
                }
            } catch (err) { document.getElementById('auth-error').innerText = "Connection error..."; }
        }

        async function handleRegister() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            try {
                const response = await fetch('https://pokemon-api-2llp.onrender.com/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    checkAuth();
                } else {
                    document.getElementById('auth-error').innerText = data.msg || "Registration failed";
                }
            } catch (err) { document.getElementById('auth-error').innerText = "Error connecting..."; }
        }

        function handleLogout() {
            localStorage.removeItem('token');
            checkAuth();
        }

        // --- POKEMON LOGIC ---
        async function catchPokemon() {
            const token = localStorage.getItem('token');
            const newPoke = {
                name: document.getElementById('poke-name').value,
                types: [document.getElementById('poke-type').value],
                sprite: document.getElementById('poke-sprite').value,
                base_stats: { 
                    hp: parseInt(document.getElementById('poke-hp').value), 
                    attack: parseInt(document.getElementById('poke-atk').value) 
                }
            };
            try {
                const response = await fetch('https://pokemon-api-2llp.onrender.com/api/v1/pokemon', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                    body: JSON.stringify(newPoke)
                });
                if (response.ok) {
                    document.getElementById('catch-msg').innerText = "Added to team!";
                    loadPokemon();
                    toggleCatchForm(); 
                }
            } catch (err) { console.error(err); }
        }

        async function loadPokemon() {
            const token = localStorage.getItem('token'); 
            const response = await fetch('https://pokemon-api-2llp.onrender.com/api/v1/pokemon', {
                headers: { 'x-auth-token': token }
            });
            if (!response.ok) return;
            const data = await response.json();
            const container = document.getElementById('pokedex');
            container.innerHTML = ""; 
            data.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${p.sprite}" alt="${p.name}">
                        <h2>${p.name}</h2>
                        <p><span class="type">${p.types[0]}</span></p>
                        <div class="stats">
                            <p>HP: ${p.base_stats.hp} | ATK: ${p.base_stats.attack}</p>
                        </div>
                        <button onclick="releasePokemon('${p._id}')" style="background: transparent; color: #ef5350; border: 1px solid #ef5350; margin-top: 10px; width: 100%;">Release</button>
                    </div>`;
            });
        }

        async function loadLeague() {
            const response = await fetch('https://pokemon-api-2llp.onrender.com/api/v1/league');
            const data = await response.json();
            const container = document.getElementById('pokedex');
            container.innerHTML = ""; 
            data.forEach(p => {
                container.innerHTML += `
                    <div class="card" style="border-color: #ffcb05;">
                        <img src="${p.sprite}" alt="${p.name}">
                        <h2>${p.name}</h2>
                        <p><span class="type" style="background: #ffcb05; color: black;">Global</span></p>
                        <div class="stats">
                            <p>HP: ${p.base_stats.hp} | ATK: ${p.base_stats.attack}</p>
                        </div>
                        <p style="font-size: 0.7em; margin-top: 10px; color: #aaa;">Trainer: ${p.user.substring(0, 8)}...</p>
                    </div>`;
            });
        }

        async function releasePokemon(id) {
            const token = localStorage.getItem('token');
            if (!confirm("Release this Pokémon?")) return;
            await fetch(`https://pokemon-api-2llp.onrender.com/api/v1/pokemon/${id}`, {
                method: 'DELETE',
                headers: { 'x-auth-token': token }
            });
            loadPokemon();
        }

        checkAuth();
    </script>
</body>
</html>
